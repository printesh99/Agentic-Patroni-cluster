# Logical metric names used by the AI/ML DBA layer.
# Keep exporter-specific PromQL here instead of hardcoding it in Python.
metrics:
  cpu_percent:
    prometheus_query: '100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])))'
  memory_percent:
    prometheus_query: '100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))'
  pod_restart_count:
    prometheus_query: 'sum(kube_pod_container_status_restarts_total{namespace="{namespace}"})'
  wal_pvc_used_percent:
    prometheus_query: '100 * max(kubelet_volume_stats_used_bytes{namespace="{namespace}",persistentvolumeclaim=~".*wal.*"} / kubelet_volume_stats_capacity_bytes{namespace="{namespace}",persistentvolumeclaim=~".*wal.*"})'
  pgdata_pvc_used_percent:
    prometheus_query: '100 * max(kubelet_volume_stats_used_bytes{namespace="{namespace}",persistentvolumeclaim=~".*pgdata.*"} / kubelet_volume_stats_capacity_bytes{namespace="{namespace}",persistentvolumeclaim=~".*pgdata.*"})'
  replication_lag_seconds:
    prometheus_query: 'max(pg_replication_lag_seconds{namespace="{namespace}"})'
  active_connections:
    prometheus_query: 'sum(pg_stat_database_numbackends{namespace="{namespace}"})'
  max_connections:
    prometheus_query: 'max(pg_settings_max_connections{namespace="{namespace}"})'
  pgbouncer_pool_used_percent:
    prometheus_query: '100 * max(pgbouncer_pools_server_active_connections{namespace="{namespace}"} / clamp_min(pgbouncer_pools_server_maxwait_seconds{namespace="{namespace}"}, 1))'
  deadlocks_per_min:
    prometheus_query: 'sum(rate(pg_stat_database_deadlocks{namespace="{namespace}"}[5m])) * 60'
  locks_waiting_count:
    prometheus_query: 'sum(pg_locks_count{namespace="{namespace}",granted="false"})'
  long_txn_count:
    prometheus_query: 'sum(pg_stat_activity_max_tx_duration{namespace="{namespace}"} > 300)'
  idle_in_transaction_count:
    prometheus_query: 'sum(pg_stat_activity_count{namespace="{namespace}",state="idle in transaction"})'
  archive_failed_count:
    prometheus_query: 'sum(increase(pg_stat_archiver_failed_count{namespace="{namespace}"}[15m]))'
  backup_duration_minutes:
    prometheus_query: 'max(pgbackrest_backup_duration_seconds{namespace="{namespace}"}) / 60'
  logical_slot_inactive_count:
    prometheus_query: 'sum(pg_replication_slots_active{namespace="{namespace}",slot_type="logical"} == 0)'
  replication_slot_retained_wal_mb:
    prometheus_query: 'max(pg_replication_slots_retained_wal_bytes{namespace="{namespace}"}) / 1024 / 1024'
  pg_stat_statements_slow_query_count:
    prometheus_query: 'sum(increase(pg_stat_statements_calls_total{namespace="{namespace}"}[5m]))'
  temp_files_mb:
    prometheus_query: 'sum(increase(pg_stat_database_temp_bytes{namespace="{namespace}"}[15m])) / 1024 / 1024'
